services:
  - type: web
    name: okstours
    runtime: node
    plan: free
    buildCommand: corepack enable && corepack pnpm install --frozen-lockfile && corepack pnpm --filter @workspace/okstours run build && corepack pnpm --filter @workspace/api-server run build
    startCommand: corepack pnpm --filter @workspace/api-server run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: okstours-db
          property: connectionString
      - key: OPENAI_API_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false

databases:
  - name: okstours-db
    plan: free
