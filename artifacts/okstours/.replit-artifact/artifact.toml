kind = "web"
previewPath = "/"
title = "OKSTours AI Agent"
version = "1.0.0"
id = "artifacts/okstours"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20738

[services.development]
run = "pnpm --filter @workspace/okstours run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/okstours", "run", "build" ]
publicDir = "artifacts/okstours/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20738"
BASE_PATH = "/"
